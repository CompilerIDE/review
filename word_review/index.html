<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>小学语文复习系统 · 字词专项</title>
    <script src="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-200: #c7d2fe;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --accent-violet: #8b5cf6;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --accent-emerald: #10b981;
            --accent-sky: #0ea5e9;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            font-feature-settings: "kern" 0;
    		text-rendering: optimizeLegibility;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f5f3ff 100%);
            padding: 24px;
            min-height: 100vh;
            color: var(--gray-800);
            line-height: 1.6;
        }
        .app-container {
            max-width: 1440px;
            margin: 0 auto;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding: 0 4px;
        }
        .app-header .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-600), var(--accent-violet));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: var(--shadow-md);
        }
        .app-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.02em;
        }
        .app-header .subtitle {
            font-size: 0.85rem;
            color: var(--gray-500);
            font-weight: 400;
            margin-top: 2px;
        }
        .main-layout {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .filter-panel {
            width: 300px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: fit-content;
            position: sticky;
            top: 24px;
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .filter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.06), rgba(139, 92, 246, 0.04));
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            cursor: pointer;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--gray-800);
            transition: background 0.2s;
            user-select: none;
        }
        .filter-header:hover {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.06));
        }
        .filter-header .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .filter-header .header-left i {
            color: var(--primary-600);
            font-size: 20px;
        }
        .filter-header .toggle-icon {
            color: var(--gray-400);
            font-size: 16px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .filter-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }
        .filter-content {
            padding: 20px 22px;
            transition: max-height 0.35s ease, opacity 0.3s ease, padding 0.35s ease;
            max-height: 2000px;
            opacity: 1;
            overflow: hidden;
        }
        .filter-content.collapsed {
            max-height: 0;
            opacity: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .filter-group {
            margin-bottom: 24px;
        }
        .filter-group:last-child {
            margin-bottom: 8px;
        }
        .filter-group label.group-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            color: var(--gray-700);
            font-size: 0.875rem;
        }
        .filter-group label.group-title i {
            color: var(--primary-500);
            font-size: 16px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .checkbox-group label {
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--gray-600);
            padding: 6px 12px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 100px;
            transition: all 0.2s;
            user-select: none;
        }
        .checkbox-group label:hover {
            background: var(--primary-50);
            border-color: var(--primary-200);
            color: var(--primary-700);
        }
        .checkbox-group label:has(input:checked) {
            background: linear-gradient(135deg, var(--primary-50), #ede9fe);
            border-color: var(--primary-200);
            color: var(--primary-700);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }
        input[type="checkbox"] {
            accent-color: var(--primary-600);
            width: 15px;
            height: 15px;
            cursor: pointer;
            flex-shrink: 0;
        }
        hr {
            margin: 16px 0;
            border: none;
            border-top: 1px solid var(--gray-200);
        }
        .filter-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .btn-sm {
            background: white;
            border: 1px solid var(--gray-200);
            padding: 7px 14px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--gray-600);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            justify-content: center;
        }
        .btn-sm:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            color: var(--gray-800);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }
        .btn-sm i {
            font-size: 14px;
        }
        .main-content {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            padding: 24px 28px;
            border: 1px solid rgba(226, 232, 240, 0.5);
            transition: box-shadow 0.3s, transform 0.3s;
        }
        .card:hover {
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .progress-area {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 220px;
        }
        .progress-area .progress-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .progress-area .progress-label i {
            color: var(--primary-500);
            font-size: 18px;
        }
        .progress-bar {
            flex: 1;
            max-width: 280px;
            height: 10px;
            background: var(--gray-200);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-500), var(--accent-violet), var(--primary-600));
            border-radius: 100px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }
        .percent-text {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--primary-600);
            min-width: 36px;
        }
        .stats-text {
            font-size: 0.8rem;
            color: var(--gray-500);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stats-text i {
            color: var(--gray-400);
        }
        .list-card {
            padding: 20px 24px;
        }
        .list-card .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1rem;
            color: var(--gray-800);
            margin-bottom: 16px;
        }
        .list-card .card-title i {
            color: var(--primary-500);
            font-size: 20px;
        }
        .question-list {
            background: var(--gray-50);
            border-radius: var(--radius-xl);
            padding: 6px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid var(--gray-200);
        }
        .question-list::-webkit-scrollbar {
            width: 6px;
        }
        .question-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .question-list::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 100px;
        }
        .question-list::-webkit-scrollbar-thumb:hover {
            background: var(--gray-400);
        }
        .question-list-item {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            transition: all 0.2s;
            color: var(--gray-700);
            border: 1px solid transparent;
        }
        .question-list-item:last-child {
            margin-bottom: 0;
        }
        .question-list-item:hover {
            background: white;
            border-color: var(--primary-200);
            box-shadow: var(--shadow-sm);
            transform: translateX(2px);
        }
        .question-list-item.selected {
            background: linear-gradient(135deg, var(--primary-50), #ede9fe);
            border-color: var(--primary-200);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08), var(--shadow-sm);
            font-weight: 600;
            color: var(--primary-700);
        }
        .status-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .status-icon .ph-check-circle {
            color: var(--accent-emerald);
        }
        .status-icon .ph-x-circle {
            color: var(--accent-rose);
        }
        .status-icon .ph-circle {
            color: var(--gray-300);
        }
        .grade-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
            background: var(--primary-100);
            color: var(--primary-700);
            flex-shrink: 0;
        }
        .fav-indicator {
            margin-left: auto;
            font-size: 14px;
            color: var(--accent-amber);
        }
        .question-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--primary-50), #ede9fe);
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.8rem;
            color: var(--primary-700);
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid var(--primary-200);
        }
        .question-meta i {
            font-size: 14px;
        }
        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 28px;
            color: var(--gray-900);
            letter-spacing: -0.01em;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-xl);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-size: 1rem;
            color: var(--gray-700);
            font-weight: 500;
        }
        .option-item:hover {
            background: var(--primary-50);
            border-color: var(--primary-300);
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }
        .option-item:has(input:checked) {
            background: linear-gradient(135deg, var(--primary-50), #ede9fe);
            border-color: var(--primary-500);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1), var(--shadow-md);
            color: var(--primary-700);
        }
        input[type="radio"] {
            accent-color: var(--primary-600);
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .feedback {
            background: linear-gradient(135deg, var(--gray-50), #f8fafc);
            border-radius: var(--radius-xl);
            padding: 18px 22px;
            margin: 20px 0;
            font-size: 0.9rem;
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
            line-height: 1.7;
        }
        .feedback strong {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .feedback .correct-badge {
            color: var(--accent-emerald);
        }
        .feedback .wrong-badge {
            color: var(--accent-rose);
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0 10px;
        }
        button {
            background: white;
            border: 1.5px solid var(--gray-200);
            padding: 10px 22px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--gray-700);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        button:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        button:active {
            transform: translateY(0);
        }
        button i {
            font-size: 16px;
        }
        button.primary {
            background: linear-gradient(135deg, var(--primary-600), var(--accent-violet));
            color: white;
            border: none;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
        }
        button.primary:hover {
            background: linear-gradient(135deg, var(--primary-700), #7c3aed);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-2px);
        }
        button.danger {
            color: var(--accent-rose);
            border-color: #fecdd3;
        }
        button.danger:hover {
            background: #fff1f2;
            border-color: #fda4af;
        }
        button.warning {
            color: var(--accent-amber);
            border-color: #fde68a;
        }
        button.warning:hover {
            background: #fffbeb;
            border-color: #fcd34d;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--gray-200);
            flex-wrap: wrap;
        }
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--gray-400);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .empty-state i {
            font-size: 40px;
            color: var(--gray-300);
        }
        .empty-state p {
            font-size: 0.9rem;
            font-weight: 500;
        }
        .hint-text {
            font-size: 0.8rem;
            color: var(--gray-400);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        @media (max-width: 860px) {
            body {
                padding: 16px;
            }
            .filter-panel {
                width: 100%;
                position: static;
            }
            .main-layout {
                flex-direction: column;
            }
            .app-header h1 {
                font-size: 1.25rem;
            }
            .question-text {
                font-size: 1.15rem;
            }
            .stats-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .progress-bar {
                max-width: 100%;
                width: 100%;
            }
            .toolbar {
                justify-content: flex-start;
            }
        }
        @media (max-width: 480px) {
            .card {
                padding: 18px 16px;
                border-radius: var(--radius-lg);
            }
            .button-group {
                justify-content: stretch;
            }
            .button-group button {
                flex: 1;
                justify-content: center;
            }
        }
    </style>
    <base target="_blank">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="logo-icon"><i class="ph-fill ph-book-open-text"></i></div>
            <div>
                <h1>小学语文复习系统</h1>
                <div class="subtitle">字词专项 · 智能练习 · 期末高频易错甄选</div>
            </div>
        </div>
        <div class="main-layout">
            <div class="filter-panel">
                <div class="filter-header" id="filterToggle">
                    <div class="header-left"><i class="ph ph-faders"></i><span>筛选面板</span></div>
                    <i class="ph ph-caret-down toggle-icon" id="toggleArrow"></i>
                </div>
                <div class="filter-content" id="filterContent">
                    <div class="filter-group">
                        <label class="group-title"><i class="ph ph-books"></i>年级</label>
                        <div class="checkbox-group" id="gradeGroup">
                            <label><input type="checkbox" value="1-3" checked> 1~3年级</label>
                            <label><input type="checkbox" value="4" checked> 4年级</label>
                            <label><input type="checkbox" value="5" checked> 5年级</label>
                            <label><input type="checkbox" value="6" checked> 6年级</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="group-title"><i class="ph ph-article"></i>题型</label>
                        <div class="checkbox-group" id="typeGroup">
                            <label><input type="checkbox" value="choice" checked> 选择题</label>
                            <label><input type="checkbox" value="judge" checked> 判断题</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="group-title"><i class="ph ph-tag"></i>类别</label>
                        <div class="checkbox-group" id="categoryGroup">
                            <label><input type="checkbox" value="字音" checked> 字音</label>
                            <label><input type="checkbox" value="字形" checked> 字形</label>
                            <label><input type="checkbox" value="多音字" checked> 多音字</label>
                            <label><input type="checkbox" value="形近字" checked> 形近字</label>
                            <label><input type="checkbox" value="笔顺" checked> 笔顺</label>
                            <label><input type="checkbox" value="部首" checked> 部首</label>
                            <label><input type="checkbox" value="成语运用" checked> 成语运用</label>
                          	<label><input type="checkbox" value="字义" checked> 字义</label>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label class="group-title"><i class="ph ph-target"></i>状态</label>
                        <div class="checkbox-group" id="stateGroup">
                            <label><input type="checkbox" id="onlyUndone"> 只看未做</label>
                            <label><input type="checkbox" id="onlyWrong"> 只看错题本</label>
                            <label><input type="checkbox" id="onlyFav"> 只看收藏夹</label>
                        </div>
                    </div>
                    <div class="filter-actions">
                        <button class="btn-sm" id="selectAllBtn"><i class="ph ph-check-square"></i>全选</button>
                        <button class="btn-sm" id="clearFilterBtn"><i class="ph ph-square"></i>清空</button>
                    </div>
                </div>
            </div>
            <div class="main-content">
                <div class="card">
                    <div class="stats-bar">
                        <div class="progress-area">

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const favBtn = document.getElementById('favBtn');
        const wrongBtn = document.getElementById('wrongBtn');
        const showWrongBtn = document.getElementById('showWrongBtn');
        const showFavBtn = document.getElementById('showFavBtn');
        const clearWrongBtn = document.getElementById('clearWrongBtn');
        const clearFavBtn = document.getElementById('clearFavBtn');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');
        const progressFill = document.getElementById('progressFill');
        const percentText = document.getElementById('percentText');
        const statsLabel = document.getElementById('statsLabel');

        function loadUserData() {
            try {
                const stored = localStorage.getItem('chinese_user_records');
                if (stored) userRecords = JSON.parse(stored);
                const storedWrong = localStorage.getItem('chinese_wrong_set');
                if (storedWrong) wrongBookSet = new Set(JSON.parse(storedWrong));
                const storedFav = localStorage.getItem('chinese_fav_set');
                if (storedFav) favoriteSet = new Set(JSON.parse(storedFav));
            } catch (e) {
                console.error('加载本地数据失败', e);
            }
        }

        function saveUserData() {
            localStorage.setItem('chinese_user_records', JSON.stringify(userRecords));
            localStorage.setItem('chinese_wrong_set', JSON.stringify([...wrongBookSet]));
            localStorage.setItem('chinese_fav_set', JSON.stringify([...favoriteSet]));
        }

        function filterQuestions() {
            let filtered = [...questions];
            const selectedGrades = Array.from(gradeChecks).filter(cb => cb.checked).map(cb => cb.value);
            filtered = filtered.filter(q => selectedGrades.includes(q.grade));
            const selectedTypes = Array.from(typeChecks).filter(cb => cb.checked).map(cb => cb.value);
            filtered = filtered.filter(q => selectedTypes.includes(q.type));
            const selectedCats = Array.from(categoryChecks).filter(cb => cb.checked).map(cb => cb.value);
            filtered = filtered.filter(q => selectedCats.includes(q.category));
            if (onlyUndone.checked) filtered = filtered.filter(q => !userRecords[q.id]?.answered);
            if (onlyWrong.checked) filtered = filtered.filter(q => wrongBookSet.has(q.id));
            if (onlyFav.checked) filtered = filtered.filter(q => favoriteSet.has(q.id));
            return filtered;
        }

        function renderQuestionList() {
            filteredQuestions = filterQuestions();
            if (!filteredQuestions.length) {
                questionListContainer.innerHTML = `
                    <div class="empty-state"><i class="ph ph-magnifying-glass"></i>
                    <p>没有符合条件的题目，请调整筛选条件</p></div>`;
                currentIndex = -1;
                currentQuestion = null;
                clearQuestionDisplay();
                return;
            }
            let html = '';
            filteredQuestions.forEach((q, idx) => {
                const record = userRecords[q.id] || {};
                let statusIcon = '<i class="ph ph-circle status-icon"></i>';
                if (record.answered) {
                    statusIcon = record.isCorrect ?
                        '<i class="ph-fill ph-check-circle status-icon"></i>' :
                        '<i class="ph-fill ph-x-circle status-icon"></i>';
                }
                const favIcon = favoriteSet.has(q.id) ?
                    '<span class="fav-indicator"><i class="ph-fill ph-star"></i></span>' : '';
                const gradeText = q.grade === '1-3' ? '1-3' : q.grade + '年级';
                const shortPrompt = q.prompt.length > 40 ? q.prompt.slice(0, 37) + '...' : q.prompt;
                html += `<div class="question-list-item" data-idx="${idx}">
                            ${statusIcon}
                            <span class="grade-badge">${gradeText}</span>
                            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${shortPrompt}</span>
                            ${favIcon}
                         </div>`;
            });
            questionListContainer.innerHTML = html;
            document.querySelectorAll('.question-list-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    if (!isNaN(idx) && filteredQuestions[idx]) {
                        currentIndex = idx;
                        displayQuestion(filteredQuestions[currentIndex]);
                        highlightSelectedListItem();
                    }
                });
            });
            if (currentIndex >= filteredQuestions.length) currentIndex = 0;
            if (filteredQuestions.length && currentIndex === -1) currentIndex = 0;
            if (filteredQuestions.length && currentIndex >= 0) {
                displayQuestion(filteredQuestions[currentIndex]);
                highlightSelectedListItem();
            } else {
                clearQuestionDisplay();
            }
            updateStats();
        }

        function highlightSelectedListItem() {
            document.querySelectorAll('.question-list-item').forEach((el, i) => {
                el.classList.toggle('selected', i === currentIndex);
            });
        }

        function clearQuestionDisplay() {
            questionMeta.innerHTML = '<i class="ph ph-question"></i>未选择题目';
            questionPrompt.innerText = '请从上方选择一道题目开始练习';
            optionsArea.innerHTML = '';
            feedbackArea.innerHTML = '';
            submitBtn.disabled = true;
        }

        function displayQuestion(q) {
            if (!q) return;
            currentQuestion = q;
            const record = userRecords[q.id] || {};
            const gradeShow = q.grade === '1-3' ? '1~3年级' : q.grade + '年级';
            const typeShow = q.type === 'choice' ? '选择题' : '判断题';
            questionMeta.innerHTML = `<i class="ph ph-question"></i>${gradeShow} · ${typeShow} · ${q.category}`;
            questionPrompt.innerText = q.prompt;
            let optsHtml = '';
            if (q.type === 'choice') {
                q.options.forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    const checkedAttr = (record.answerGiven === opt) ? 'checked' : '';
                    optsHtml += `<label class="option-item">
                        <input type="radio" name="questionOption" value="${opt.replace(/"/g, '&quot;')}" ${checkedAttr}>
                        <span><strong style="color:var(--primary-600);margin-right:6px;">${letter}.</strong>${opt}</span>
                    </label>`;
                });
            } else {
                const checkedTrue = (record.answerGiven === '正确') ? 'checked' : '';
                const checkedFalse = (record.answerGiven === '错误') ? 'checked' : '';
                optsHtml = `<label class="option-item">
                    <input type="radio" name="questionOption" value="正确" ${checkedTrue}>
                    <span><i class="ph ph-check" style="color:var(--accent-emerald);margin-right:8px;"></i>正确</span>
                </label><label class="option-item">
                    <input type="radio" name="questionOption" value="错误" ${checkedFalse}>
                    <span><i class="ph ph-x" style="color:var(--accent-rose);margin-right:8px;"></i>错误</span>
                </label>`;
            }
            optionsArea.innerHTML = optsHtml;
            submitBtn.disabled = false;

            if (record.answered) {
                const isCorrect = record.isCorrect;
                const badgeClass = isCorrect ? 'correct-badge' : 'wrong-badge';
                const badgeIcon = isCorrect ? 'ph-check-circle' : 'ph-x-circle';
                const badgeText = isCorrect ? '回答正确' : '回答错误';
                feedbackArea.innerHTML = `
                    <strong class="${badgeClass}"><i class="ph-fill ${badgeIcon}"></i>${badgeText}</strong><br>
                    <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
                        <div><span style="color:var(--gray-500)">你的答案：</span><span style="font-weight:600;color:var(--gray-800)">${record.answerGiven || '无'}</span></div>
                        <div><span style="color:var(--gray-500)">正确答案：</span><span style="font-weight:600;color:var(--accent-emerald)">${q.answer}</span></div>
                        <div style="margin-top:6px;padding-top:10px;border-top:1px dashed var(--gray-200);"><span style="color:var(--gray-500)">解析：</span><span style="color:var(--gray-700)">${q.explain}</span></div>
                    </div>
                    <div class="hint-text"><i class="ph ph-lightbulb"></i>你可以重新选择答案并再次提交来修改作答记录。</div>`;
            } else {
                feedbackArea.innerHTML =
                    '<div style="display:flex;align-items:center;gap:8px;color:var(--gray-500)"><i class="ph ph-lightbulb"></i>请选择一个选项后提交答案。</div>';
            }
            favBtn.innerHTML = favoriteSet.has(q.id) ?
                '<i class="ph-fill ph-star" style="color:var(--accent-amber)"></i>已收藏' :
                '<i class="ph ph-star"></i>收藏';
            wrongBtn.innerHTML = wrongBookSet.has(q.id) ?
                '<i class="ph-fill ph-push-pin" style="color:var(--accent-rose)"></i>移出错题本' :
                '<i class="ph ph-push-pin"></i>加入错题本';
        }

        function submitAnswer() {
            if (!currentQuestion) return;
            const selectedRadio = document.querySelector('input[name="questionOption"]:checked');
            if (!selectedRadio) {
                feedbackArea.innerHTML =
                    '<div style="display:flex;align-items:center;gap:8px;color:var(--accent-rose)"><i class="ph-fill ph-warning-circle"></i>请先选择一个答案！</div>';
                return;
            }
            const selectedValue = selectedRadio.value;
            const isCorrect = (selectedValue === currentQuestion.answer);
            if (!userRecords[currentQuestion.id]) userRecords[currentQuestion.id] = {};
            userRecords[currentQuestion.id].answered = true;
            userRecords[currentQuestion.id].isCorrect = isCorrect;
            userRecords[currentQuestion.id].answerGiven = selectedValue;
            if (isCorrect) {
                wrongBookSet.delete(currentQuestion.id);
            } else {
                wrongBookSet.add(currentQuestion.id);
            }
            saveUserData();
            displayQuestion(currentQuestion);
            renderQuestionList();
            updateStats();
        }

        function toggleFavorite() {
            if (!currentQuestion) return;
            if (favoriteSet.has(currentQuestion.id)) favoriteSet.delete(currentQuestion.id);
            else favoriteSet.add(currentQuestion.id);
            saveUserData();
            displayQuestion(currentQuestion);
            renderQuestionList();
            updateStats();
        }

        function toggleWrongBook() {
            if (!currentQuestion) return;
            if (wrongBookSet.has(currentQuestion.id)) {
                wrongBookSet.delete(currentQuestion.id);
            } else {
                wrongBookSet.add(currentQuestion.id);
            }
            saveUserData();
            displayQuestion(currentQuestion);
            renderQuestionList();
            updateStats();
        }

        function nextQuestion() {
            if (!filteredQuestions.length) return;
            currentIndex = (currentIndex + 1) % filteredQuestions.length;
            displayQuestion(filteredQuestions[currentIndex]);
            highlightSelectedListItem();
        }

        function prevQuestion() {
            if (!filteredQuestions.length) return;
            currentIndex = (currentIndex - 1 + filteredQuestions.length) % filteredQuestions.length;
            displayQuestion(filteredQuestions[currentIndex]);
            highlightSelectedListItem();
        }

        function updateStats() {
            const total = questions.length;
            let doneCount = 0,
                correctCount = 0;
            for (let q of questions) {
                const rec = userRecords[q.id];
                if (rec?.answered) {
                    doneCount++;
                    if (rec.isCorrect) correctCount++;
                }
            }
            const percent = total ? Math.floor((doneCount / total) * 100) : 0;
            progressFill.style.width = percent + '%';
            percentText.innerText = percent + '%';
            statsLabel.innerHTML =
                `<i class="ph ph-info"></i><span>总题数：${total} | 已做：${doneCount} | 正确：${correctCount} | 错题本：${wrongBookSet.size} | 收藏：${favoriteSet.size}</span>`;
        }

        function setAllFilters(checked) {
            gradeChecks.forEach(cb => cb.checked = checked);
            typeChecks.forEach(cb => cb.checked = checked);
            categoryChecks.forEach(cb => cb.checked = checked);
            onlyUndone.checked = false;
            onlyWrong.checked = false;
            onlyFav.checked = false;
            renderQuestionList();
        }

        function showWrongOnly() {
            onlyWrong.checked = true;
            onlyUndone.checked = false;
            onlyFav.checked = false;
            renderQuestionList();
        }

        function showFavOnly() {
            onlyFav.checked = true;
            onlyWrong.checked = false;
            onlyUndone.checked = false;
            renderQuestionList();
        }

        function clearWrongBook() {
            if (confirm('确定清空错题本吗？')) {
                wrongBookSet.clear();
                saveUserData();
                renderQuestionList();
                if (currentQuestion) displayQuestion(currentQuestion);
                updateStats();
            }
        }

        function clearFavorite() {
            if (confirm('清空收藏夹？')) {
                favoriteSet.clear();
                saveUserData();
                renderQuestionList();
                if (currentQuestion) displayQuestion(currentQuestion);
                updateStats();
            }
        }

        function clearHistory() {
            if (confirm('清空所有做题记录？收藏夹和错题本也会重置。\n此操作不可逆。')) {
                userRecords = {};
                wrongBookSet.clear();
                favoriteSet.clear();
                saveUserData();
                currentIndex = -1;
                renderQuestionList();
                updateStats();
            }
        }

        filterToggle.addEventListener('click', () => {
            const isCollapsed = filterContent.classList.contains('collapsed');
            if (isCollapsed) {
                filterContent.classList.remove('collapsed');
                filterToggle.classList.remove('collapsed');
            } else {
                filterContent.classList.add('collapsed');
                filterToggle.classList.add('collapsed');
            }
        });

        const filterInputs = [...gradeChecks, ...typeChecks, ...categoryChecks, onlyUndone, onlyWrong, onlyFav];
        filterInputs.forEach(el => el.addEventListener('change', () => renderQuestionList()));
        selectAllBtn.addEventListener('click', () => setAllFilters(true));
        clearFilterBtn.addEventListener('click', () => setAllFilters(false));
        submitBtn.addEventListener('click', submitAnswer);
        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
        favBtn.addEventListener('click', toggleFavorite);
        wrongBtn.addEventListener('click', toggleWrongBook);
        showWrongBtn.addEventListener('click', showWrongOnly);
        showFavBtn.addEventListener('click', showFavOnly);
        clearWrongBtn.addEventListener('click', clearWrongBook);
        clearFavBtn.addEventListener('click', clearFavorite);
        clearHistoryBtn.addEventListener('click', clearHistory);

        loadUserData();
        renderQuestionList();
    </script>
</body>
</html>
